<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto | WAFFLES TECH</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    :root {
      --green-1: #6ee78a;
      --green-2: #4ade80;
      --green-3: #2d9d4c;
      --green-4: #1a7a3a;
      --gradient: linear-gradient(180deg, #6ee78a 0%, #4ade80 50%, #2d9d4c 100%);
      --bg-white: #ffffff;
      --bg-cream: #fafaf8;
      --bg-offwhite: #f5f5f0;
      --text-dark: #1a1a2e;
      --text-gray: #666677;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-cream);
      color: var(--text-dark);
      overflow-x: hidden;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #three-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      pointer-events: none;
    }

    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(26, 122, 58, 0.04) 2px, rgba(26, 122, 58, 0.04) 4px);
      animation: scanMove 10s linear infinite;
    }

    @keyframes scanMove {
      0% { background-position: 0 0; }
      100% { background-position: 0 100px; }
    }

    .retro-grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
      background-image: 
        linear-gradient(rgba(74, 222, 128, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74, 222, 128, 0.08) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.6;
    }

    /* ===== HEADER ===== */
    .header {
      padding: 3rem 1.5rem 2rem;
      text-align: center;
      background: var(--bg-white);
      border-bottom: 4px solid var(--green-3);
      position: relative;
      z-index: 10;
    }

    .header h1 {
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      color: var(--green-4);
      margin-bottom: 1.5rem;
      text-shadow: 4px 4px 0px rgba(74, 222, 128, 0.3);
      animation: fadeInDown 0.8s ease-out;
    }

    .nav {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeInUp 1s ease-out 0.3s both;
    }

    .nav a {
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(0.55rem, 2vw, 0.65rem);
      color: var(--green-4);
      text-decoration: none;
      padding: clamp(0.8rem, 2vw, 1rem) clamp(1.2rem, 3vw, 1.8rem);
      border: 3px solid var(--green-3);
      background: var(--bg-white);
      box-shadow: 4px 4px 0px var(--green-3);
      transition: all 0.15s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .nav a:hover {
      transform: translate(-3px, -3px);
      box-shadow: 7px 7px 0px var(--green-4);
      background: var(--gradient);
      color: var(--bg-white);
    }

    .nav a:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px var(--green-3);
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== CONTACT FORM ===== */
    .contact-form {
      padding: 4rem 1.5rem;
      background: var(--bg-cream);
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    form {
      background: var(--bg-white);
      border: 4px solid var(--green-3);
      padding: clamp(2rem, 5vw, 3rem);
      width: 100%;
      max-width: 600px;
      box-shadow: 8px 8px 0px var(--green-4);
      animation: zoomIn 0.6s ease-out;
    }

    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    input, textarea {
      width: 100%;
      padding: 1rem;
      margin-bottom: 1.5rem;
      border: 3px solid var(--green-3);
      background: var(--bg-offwhite);
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      color: var(--text-dark);
      transition: all 0.3s ease;
      outline: none;
    }

    input:focus, textarea:focus {
      background: var(--bg-white);
      box-shadow: 4px 4px 0px var(--green-2);
      transform: translate(-2px, -2px);
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    button[type="submit"] {
      width: 100%;
      padding: 1rem;
      background: var(--gradient);
      border: 3px solid var(--green-4);
      color: var(--bg-white);
      font-family: 'Press Start 2P', cursive;
      font-size: 0.9rem;
      cursor: pointer;
      box-shadow: 4px 4px 0px var(--green-4);
      transition: all 0.15s ease;
      text-transform: uppercase;
    }

    button[type="submit"]:hover {
      transform: translate(-3px, -3px);
      box-shadow: 7px 7px 0px var(--green-4);
    }

    button[type="submit"]:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px var(--green-4);
    }

    /* ===== GAME SECTION ===== */
    .game-section {
      background: var(--bg-offwhite);
      padding: 4rem 1.5rem;
      text-align: center;
      border-top: 4px solid var(--green-3);
      border-bottom: 4px solid var(--green-3);
      position: relative;
    }

    .game-section h2 {
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(1.2rem, 4vw, 2rem);
      color: var(--green-4);
      margin-bottom: 1.5rem;
      text-shadow: 3px 3px 0px rgba(74, 222, 128, 0.3);
    }

    .game-section p {
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(0.5rem, 1.5vw, 0.65rem);
      color: var(--text-gray);
      margin-bottom: 0.5rem;
      line-height: 2;
    }

    .game-section b { color: var(--green-3); }

    .hud {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 2rem 0;
      flex-wrap: wrap;
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(0.5rem, 1.5vw, 0.65rem);
    }

    #score {
      color: #d946ef;
      background: var(--bg-white);
      padding: 0.7rem 1.3rem;
      border: 3px solid #d946ef;
      box-shadow: 3px 3px 0px #d946ef;
    }

    #lives {
      color: #ef4444;
      background: var(--bg-white);
      padding: 0.7rem 1.3rem;
      border: 3px solid #ef4444;
      box-shadow: 3px 3px 0px #ef4444;
    }

    #musicBtn {
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(0.5rem, 1.5vw, 0.65rem);
      background: var(--gradient);
      border: 3px solid var(--green-4);
      padding: 0.7rem 1.8rem;
      cursor: pointer;
      color: var(--bg-white);
      box-shadow: 4px 4px 0px var(--green-4);
      transition: all 0.15s ease;
    }

    #musicBtn:hover {
      transform: translate(-3px, -3px);
      box-shadow: 7px 7px 0px var(--green-4);
    }

    #musicBtn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px var(--green-4);
    }

    #musicBtn.playing {
      animation: btnPulse 0.4s step-end infinite;
    }

    @keyframes btnPulse {
      0%, 100% { background: var(--gradient); }
      50% { background: var(--green-4); }
    }

    .canvas-container {
      display: flex;
      justify-content: center;
      margin-top: 2rem;
    }

    #catGame {
      border: 4px solid var(--green-3);
      box-shadow: 6px 6px 0px var(--green-4);
      max-width: 100%;
      height: auto;
      background: #1a1a2e;
      width: 100%;
      max-width: 600px;
    }

    /* ===== FOOTER ===== */
    .footer {
      background: var(--bg-offwhite);
      padding: 3rem 1.5rem;
      text-align: center;
      border-top: 4px solid var(--green-3);
      margin-top: auto;
    }

    .footer p {
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(0.5rem, 1.5vw, 0.65rem);
      color: var(--text-gray);
      line-height: 2;
    }

    /* ===== PIXEL CORNERS ===== */
    .pixel-corner {
      position: fixed;
      width: clamp(20px, 5vw, 25px);
      height: clamp(20px, 5vw, 25px);
      border: 3px solid var(--green-3);
      pointer-events: none;
      z-index: 100;
    }

    .pixel-corner.tl { top: 15px; left: 15px; border-right: none; border-bottom: none; }
    .pixel-corner.tr { top: 15px; right: 15px; border-left: none; border-bottom: none; }
    .pixel-corner.bl { bottom: 15px; left: 15px; border-right: none; border-top: none; }
    .pixel-corner.br { bottom: 15px; right: 15px; border-left: none; border-top: none; }

    @media (max-width: 480px) {
      .pixel-corner { display: none; }
    }
  </style>
</head>
<body>
  <!-- THREE.JS 3D CITY BACKGROUND -->
  <canvas id="three-bg"></canvas>
  
  <!-- RETRO EFFECTS -->
  <div class="scanlines"></div>
  <div class="retro-grid"></div>

  <!-- PIXEL CORNERS -->
  <div class="pixel-corner tl"></div>
  <div class="pixel-corner tr"></div>
  <div class="pixel-corner bl"></div>
  <div class="pixel-corner br"></div>

  <!-- HEADER -->
  <header class="header">
    <h1>CONTÁCTANOS</h1>
    <nav class="nav">
      <a href="index.html">Inicio</a>
      <a href="servicios.html">Servicios</a>
      <a href="contacto.html">Contacto</a>
    </nav>
  </header>

  <!-- CONTACT FORM -->
  <section class="contact-form">
    <form onsubmit="event.preventDefault(); alert('¡Mensaje enviado! 🚀');">
      <input type="text" placeholder="Tu nombre" required>
      <input type="email" placeholder="Tu correo" required>
      <textarea placeholder="Escribe tu mensaje..." required></textarea>
      <button type="submit">ENVIAR</button>
    </form>
  </section>

  <!-- GAME SECTION -->
  <section class="game-section">
    <h2>🐱 DEMO ESCAPA</h2>
    <p>INSTRUCCIONES</p>
    <p>PRESIONA <b>ESPACIO</b> PARA SALTAR Y <b>A+S</b> PARA SALTAR MÁS ALTO 🚀</p>
    <p>PRESIONA <b>B</b> PARA PROYECTILES BOMBA <b>X+P</b> PARA EVOLUCIONAR 🚀</p>
    
    <div class="hud">
      <span id="score">PUNTOS: 0</span>
      <span id="lives">❤️❤️❤️</span>
      <button id="musicBtn">🎵 MUSICA</button>
    </div>
    
    <div class="canvas-container">
      <canvas id="catGame" width="600" height="300"></canvas>
    </div>
  </section>

  <!-- AUDIO -->
  <audio id="bgMusic" src="audio/musica.mp3" loop></audio>
  <audio id="bgMusic1" src="audio/level2.mp3" loop></audio>

  <!-- FOOTER -->
  <footer class="footer">
    <p>⚡ WAFFLES TECH DESDE 2024 · YA EXISTIMOS</p>
  </footer>

  <script src="game6.js"></script>
  
  <script>
    // ===== THREE.JS 3D CITY OPTIMIZADO =====
    function initThreeJS() {
      const canvas = document.getElementById('three-bg');
      if (!canvas) return;
      
      if (typeof THREE === 'undefined') {
        console.log('Three.js no cargó');
        return;
      }

      try {
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xfafaf8);
        scene.fog = new THREE.Fog(0xfafaf8, 30, 70);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ 
          canvas: canvas, 
          alpha: true, 
          antialias: false,
          powerPreference: 'low-power'
        });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));

        const buildingColors = [0x6ee78a, 0x4ade80, 0x2d9d4c, 0x1a7a3a];
        const allObjects = [];

        function createBuilding() {
          const height = 5 + Math.random() * 12;
          const width = 3 + Math.random() * 3;
          const depth = 3 + Math.random() * 3;
          
          const buildingGeo = new THREE.BoxGeometry(width, height, depth);
          const buildingMat = new THREE.MeshPhongMaterial({
            color: buildingColors[Math.floor(Math.random() * buildingColors.length)],
            shininess: 30
          });
          
          const building = new THREE.Mesh(buildingGeo, buildingMat);
          building.position.x = (Math.random() - 0.5) * 60;
          building.position.y = (Math.random() - 0.5) * 40;
          building.position.z = -60 - Math.random() * 30;
          
          scene.add(building);
          
          return {
            mesh: building,
            speed: 0.4 + Math.random() * 0.3,
            rotationSpeed: (Math.random() - 0.5) * 0.015
          };
        }

        for (let i = 0; i < 20; i++) {
          allObjects.push(createBuilding());
        }

        function createEnergySphere() {
          const sphereGeo = new THREE.SphereGeometry(2, 12, 12);
          const sphereMat = new THREE.MeshPhongMaterial({
            color: 0x4ade80,
            transparent: true,
            opacity: 0.5,
            shininess: 50
          });
          
          const sphere = new THREE.Mesh(sphereGeo, sphereMat);
          sphere.position.x = (Math.random() - 0.5) * 60;
          sphere.position.y = (Math.random() - 0.5) * 40;
          sphere.position.z = -60 - Math.random() * 30;
          
          scene.add(sphere);
          
          return {
            mesh: sphere,
            speed: 0.6 + Math.random() * 0.2,
            rotationSpeed: (Math.random() - 0.5) * 0.03
          };
        }

        for (let i = 0; i < 5; i++) {
          allObjects.push(createEnergySphere());
        }

        const gridHelper = new THREE.GridHelper(150, 50, 0x2d9d4c, 0x1a7a3a);
        gridHelper.position.y = -30;
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        camera.position.z = 10;
        camera.position.y = 3;

        let time = 0;

        function animate() {
          requestAnimationFrame(animate);
          time += 0.015;

          allObjects.forEach(obj => {
            obj.mesh.position.z += obj.speed;
            obj.mesh.rotation.y += obj.rotationSpeed;
            
            if (obj.mesh.position.z > 15) {
              obj.mesh.position.z = -90;
              obj.mesh.position.x = (Math.random() - 0.5) * 60;
              obj.mesh.position.y = (Math.random() - 0.5) * 40;
            }
          });

          gridHelper.position.z = (time * 10) % 3;

          camera.position.x = Math.sin(time * 0.2) * 3;
          camera.position.y = 3 + Math.cos(time * 0.15) * 2;
          camera.lookAt(0, 0, -10);

          renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });
      } catch (error) {
        console.log('Error en Three.js:', error);
      }
    }

    setTimeout(initThreeJS, 100);

    // ===== MUSICA =====
    const musicBtn = document.getElementById('musicBtn');
    const bgMusic = document.getElementById('bgMusic');
    let isPlaying = false;

    musicBtn.addEventListener('click', () => {
      if (isPlaying) {
        bgMusic.pause();
        musicBtn.textContent = '🎵 MUSICA';
        musicBtn.classList.remove('playing');
      } else {
        bgMusic.play().catch(e => console.log('Audio:', e));
        musicBtn.textContent = '⏸️ PAUSA';
        musicBtn.classList.add('playing');
      }
      isPlaying = !isPlaying;
    });

    // ===== RESIZE CANVAS GAME =====
    function resizeCanvas() {
      const container = document.querySelector('.canvas-container');
      const canvas = document.getElementById('catGame');
      if (container && canvas) {
        const maxW = Math.min(600, container.clientWidth - 40);
        canvas.style.width = maxW + 'px';
        canvas.style.height = (maxW * 0.5) + 'px';
      }
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
  </script>
</body>
</html>
